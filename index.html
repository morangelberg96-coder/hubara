                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.value = frequency;
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                gainNode.gain.value = vol;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                setTimeout(() => { oscillator.stop(); audioCtx.close(); }, duration * 1000);
            } catch(e) {}
        };

                const randomWord = CONTENT.flashWords[Math.floor(Math.random() * CONTENT.flashWords.length)];

                const distractors = shuffleArray(CONTENT.flashWords.filter(w => w !== randomWord)).slice(0, 2);
                const opts = shuffleArray([randomWord, ...distractors]);
                setOptions(opts);

                setTimeout(() => {
                    setStage('options');
                }, wordSpeed * 1000);
            };

            const handleGuess = (guess) => {
                if (guess === currentWord) {
                    playSuccess();
                    setScore(s => s + 1);
                    setStage('correct');
                    setTimeout(() => {
                        if (timeLeft > 0) startNextRound();
                    }, 500);
                } else {
                    playError();
                    setStage('flash');
                    setTimeout(() => {
                        setStage('options');
                    }, wordSpeed * 1000);
                }
            };

            if (stage === 'done' && !isPlaying && timeLeft === 0) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-[70vh] fade-in pb-10 space-y-6">
                        <div className="text-center fade-in mt-20">
                            <h2 className="text-5xl font-bold text-success mb-4">{formatText("הַזְּמַן עָבַר!", nikkudLevel)}</h2>
                            <p className="text-3xl text-amber-900 mb-8">{formatText(`הִצְלַחְתֶּם לְזַהוֹת מַהֵר ${score} מִילִּים. כָּל הַכָּבוֹד!`, nikkudLevel)}</p>
                        </div>
                        <button onClick={() => setStage('flash')} className="px-8 py-3 bg-primary text-white text-xl font-bold rounded-xl shadow hover:bg-amber-600 transition">{formatText("שַׂחֲקוּ שׁוּב", nikkudLevel)}</button>
                    </div>
                );
            }

            if (!isPlaying && stage !== 'done') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-[70vh] fade-in pb-10 space-y-6">
                        <h2 className="text-4xl font-bold text-primary">{formatText("חֲשִׂיפָה מְהִירָה", nikkudLevel)}</h2>
                        <p className="text-2xl text-amber-900 text-center px-4">{formatText("מִילָה תּוֹפִיעַ וְתֵעָלֵם מַהֵר. מַהֲרוּ לְזַהוֹת וְלִבְחוֹר בָּהּ עַד שֶׁהַזְּמַן יִסְתַּיֵּים!", nikkudLevel)}</p>
                        <div className="bg-white p-6 rounded-2xl shadow-md border-2 border-amber-200 text-center w-full max-w-3xl">
                            <div className="mb-8">
                                <h3 className="text-xl font-bold text-amber-800 mb-4">{formatText("1. בַּחֲרוּ אֶת זְמַן הַמִּשְׂחָק הַכּוֹלֵל:", nikkudLevel)}</h3>
                                <div className="flex flex-wrap justify-center gap-4">
                                    {[{time: 30, label: "חֲצִי דַּקָּה"}, {time: 60, label: "1 דַּקָּה"}, {time: 90, label: "דַּקָּה וָחֵצִי"}, {time: 120, label: "2 דַּקּוֹת"}].map(opt => (
                                        <button key={opt.time} onClick={() => setGameDuration(opt.time)} className={`px-6 py-2 rounded-xl font-bold text-lg border-2 transition ${gameDuration === opt.time ? 'bg-primary text-white border-primary shadow-md transform scale-105' : 'bg-amber-50 text-amber-800 border-amber-300 hover:bg-amber-100'}`}>
                                            {formatText(opt.label, nikkudLevel)}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="mb-8">
                                <h3 className="text-xl font-bold text-amber-800 mb-4">{formatText("2. בַּחֲרוּ אֶת מְהִירוּת הֵיעָלְמוּת הַמִּילָה:", nikkudLevel)}</h3>
                                <div className="flex flex-wrap justify-center gap-3">
                                    {[{speed: 2.5, label: "מַמָּשׁ לְאַט"}, {speed: 1.5, label: "לְאַט"}, {speed: 1.0, label: "רָגִיל"}, {speed: 0.7, label: "מַהֵר"}, {speed: 0.4, label: "מַהֵר מְאוֹד"}].map(opt => (
                                        <button key={opt.speed} onClick={() => setWordSpeed(opt.speed)} className={`px-4 py-2 rounded-xl font-bold border-2 transition ${wordSpeed === opt.speed ? 'bg-secondary text-white border-secondary shadow-md transform scale-105' : 'bg-amber-50 text-amber-800 border-amber-300 hover:bg-amber-100'}`}>
                                            {formatText(opt.label, nikkudLevel)}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button onClick={startGame} className="w-full py-4 bg-success hover:bg-green-600 transition text-white text-2xl font-bold rounded-xl shadow-md mt-4">{formatText("הַתְחֵל מִשְׂחָק", nikkudLevel)}</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center justify-center min-h-[70vh] fade-in pb-10 space-y-8">
                    <div className="flex justify-between items-center w-full max-w-5xl px-4 flex-wrap gap-4">
                        <div className="text-2xl font-bold text-amber-800 bg-white px-6 py-2 rounded-full border-2 border-amber-200 shadow"><i className="fa-solid fa-star text-yellow-400 mr-2"></i> {score} {formatText("נְקוּדּוֹת", nikkudLevel)}</div>
                        
                        <div className="flex items-center gap-2 bg-white px-4 py-2 rounded-full border-2 border-amber-200 shadow flex-wrap justify-center">
                            <span className="font-bold text-amber-800 text-sm hidden md:inline">{formatText("מְהִירוּת:", nikkudLevel)}</span>
                            {[{speed: 2.5, label: "מַמָּשׁ לְאַט"}, {speed: 1.5, label: "לְאַט"}, {speed: 1.0, label: "רָגִיל"}, {speed: 0.7, label: "מַהֵר"}, {speed: 0.4, label: "מַהֵר מְאוֹד"}].map(opt => (
                                <button key={opt.speed} onClick={() => setWordSpeed(opt.speed)} className={`px-2 md:px-3 py-1 rounded-lg text-xs md:text-sm font-bold transition ${wordSpeed === opt.speed ? 'bg-secondary text-white' : 'bg-amber-50 text-amber-700 hover:bg-amber-100'}`}>
                                    {formatText(opt.label, nikkudLevel)}
                                </button>
                            ))}
                        </div>

                        <div className={`text-2xl font-bold px-6 py-2 rounded-full border-2 shadow flex items-center gap-2 ${timeLeft <= 10 ? 'text-red-600 border-red-300 bg-red-50 animate-pulse' : 'text-primary border-amber-300 bg-amber-50'}`}>
                            <i className="fa-solid fa-stopwatch"></i> {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                        </div>
                    </div>

                    <div className="h-64 w-full max-w-2xl bg-white rounded-3xl shadow-lg border-4 border-amber-300 flex items-center justify-center relative overflow-hidden">
                        {stage === 'flash' && (
                            <div className="text-6xl md:text-8xl font-bold text-amber-900 animate-pulse">{formatText(currentWord, nikkudLevel)}</div>
                        )}
                        {stage === 'options' && (
                            <div className="text-3xl text-amber-400 opacity-50 font-bold"><i className="fa-solid fa-eye-slash"></i> {formatText("הַמִּילָה נֶעֶלְמָה!", nikkudLevel)}</div>
                        )}
                        {stage === 'correct' && (
                            <div className="text-6xl font-bold text-success fade-in"><i className="fa-solid fa-check"></i></div>
                        )}
                    </div>

                    {stage === 'options' && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl fade-in">
                            {options.map((opt, i) => (
                                <button key={i} onClick={() => handleGuess(opt)} className="py-6 bg-white border-4 border-amber-200 hover:border-primary hover:bg-amber-50 rounded-2xl text-3xl font-bold text-amber-900 shadow-md transition-all transform hover:scale-105 active:scale-95">
                                    {formatText(opt, nikkudLevel)}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const ScreenAuditory = ({ nikkudLevel }) => {
            const [currentQ, setCurrentQ] = useState(0);
            const [errorMsg, setErrorMsg] = useState("");
            const [shuffledOptions, setShuffledOptions] = useState([]);

            useEffect(() => {
                if (CONTENT.auditory[currentQ]) {
                    setShuffledOptions(shuffleArray(CONTENT.auditory[currentQ].options));
                }
            }, [currentQ]);

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'he-IL';
                    window.speechSynthesis.speak(utterance);
                }
            };

            const handleAnswer = (opt) => {
                if (opt === CONTENT.auditory[currentQ].word) {
                    playSuccess();
                    setErrorMsg("");
                    if (currentQ < CONTENT.auditory.length - 1) setTimeout(() => setCurrentQ(q => q + 1), 1000);
                    else triggerConfetti();
                } else {
                    playError();
                    setErrorMsg(formatText("נַסּוּ שׁוּב!", nikkudLevel));
                }
            };

            if (currentQ >= CONTENT.auditory.length) return <div className="text-center text-3xl font-bold text-success fade-in mt-20">{formatText("כָּל הַכָּבוֹד! סִיַּימְתֶּם אֶת הָאִימּוּן הַשְּׁמִיעָתִי.", nikkudLevel)}</div>;
            const q = CONTENT.auditory[currentQ];

            return (
                <div className="flex flex-col items-center justify-center min-h-[70vh] space-y-8 fade-in pb-10">
                    <h2 className="text-3xl font-bold text-primary">{formatText("אִימּוּן שְׁמִיעָתִי", nikkudLevel)}</h2>
                    <p className="text-xl text-amber-800">{formatText("לַחֲצוּ עַל הָרַמְקוֹל, הַקְשִׁיבוּ לַמִּילָה, וּבַחֲרוּ אֶת הַמִּילָה הַנְּכוֹנָה.", nikkudLevel)}</p>
                    <button onClick={() => speak(formatText(q.word, 'none'))} className="w-32 h-32 bg-amber-100 border-4 border-primary rounded-full flex items-center justify-center text-5xl text-primary shadow-lg hover:bg-amber-200 transition transform hover:scale-105 active:scale-95">
                        <i className="fa-solid fa-volume-high"></i>
                    </button>
                    <div className="flex flex-wrap justify-center gap-4 mt-8">
                        {shuffledOptions.map((opt, i) => (
                            <button key={i} onClick={() => handleAnswer(opt)} className="px-8 py-4 bg-white border-2 border-amber-300 rounded-xl text-2xl font-bold text-amber-900 shadow hover:bg-amber-50 transition">
                                {formatText(opt, nikkudLevel)}
                            </button>
                        ))}
                    </div>
                    {errorMsg && <div className="text-error font-bold text-xl shake mt-4"><i className="fa-solid fa-circle-xmark mr-2"></i>{errorMsg}</div>}
                    <div className="text-amber-600 font-bold">{formatText(`שְׁאֵלָה ${currentQ + 1} מִתּוֹךְ ${CONTENT.auditory.length}`, nikkudLevel)}</div>
                </div>
            );
        };

        const ScreenFluency = ({ nikkudLevel, attempts, setAttempts }) => {
            const [timerOn, setTimerOn] = useState(false);
            const [time, setTime] = useState(0);
            const [done, setDone] = useState(false);
            const allParaIds = CONTENT.paragraphs.map((_, i) => i.toString());
            const [selectedParas, setSelectedParas] = useState(allParaIds);
            const [activeWordId, setActiveWordId] = useState(null);
            
            const [selectedMarker, setSelectedMarker] = useState('#FEF08A');
            const [highlights, setHighlights] = useState({});

            const parasToRender = CONTENT.paragraphs.filter((_, i) => selectedParas.includes(i.toString()));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (timerOn && !done && ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                        e.preventDefault(); 
                        const allWordIds = [];
                        parasToRender.forEach((p) => {
                            const originalIndex = CONTENT.paragraphs.findIndex(orig => orig.id === p.id);
                            const words = formatText(p.text, nikkudLevel).split(/\s+/);
                            words.forEach((w, wIndex) => allWordIds.push(`${originalIndex}-${wIndex}`));
                        });
                        if (allWordIds.length === 0) return;
                        if (!activeWordId) { setActiveWordId(allWordIds[0]); } else {
                            const currentIndex = allWordIds.indexOf(activeWordId);
                            if (currentIndex !== -1) {
                                let nextIndex = currentIndex;
                                if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') nextIndex = currentIndex + 1;
                                if (e.key === 'ArrowRight' || e.key === 'ArrowUp') nextIndex = currentIndex - 1;
                                
                                if (nextIndex >= allWordIds.length) nextIndex = currentIndex;
                                if (nextIndex < 0) nextIndex = 0;
                                setActiveWordId(allWordIds[nextIndex]);
                            }
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [timerOn, done, activeWordId, parasToRender, nikkudLevel]);

            useEffect(() => {
                if (activeWordId) {
                    const el = document.getElementById(`word-${activeWordId}`);
                    if (el) {
                        const rect = el.getBoundingClientRect();
                        if (rect.top < 150 || rect.bottom > (window.innerHeight - 100)) {
                            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }
                }
            }, [activeWordId]);

            useEffect(() => {
                let interval = null;
                if (timerOn) { interval = setInterval(() => setTime(t => t + 1), 1000); } 
                else if (!timerOn && time !== 0) { clearInterval(interval); }
                return () => clearInterval(interval);
            }, [timerOn, time]);

            const handleReset = () => { setTimerOn(false); setTime(0); setDone(false); setActiveWordId(null); setHighlights({}); };

            const togglePara = (id) => {
                if (timerOn || done) return;
                setSelectedParas(prev => {
                    if (prev.length === CONTENT.paragraphs.length) return [id];
                    if (prev.includes(id)) {
                        const next = prev.filter(p => p !== id);
                        return next.length > 0 ? next : prev;
                    }
                    return [...prev, id].sort();
                });
            };

            const toggleAll = () => { if (!timerOn && !done) setSelectedParas(allParaIds); };
            const isAll = selectedParas.length === CONTENT.paragraphs.length;

            const handleFinish = () => {
                setTimerOn(false);
                setDone(true);
                const wordsCount = parasToRender.reduce((acc, p) => acc + p.text.split(/\s+/).length, 0);
                const currentWcpm = time > 0 ? Math.round((wordsCount / time) * 60) : 0;
                setAttempts(prev => [...prev, { wcpm: currentWcpm }]);
                playSuccess();
                triggerConfetti();
            };

            const handleWordClickFluency = (wordId) => {
                setActiveWordId(wordId);
                setHighlights(prev => {
                    const next = { ...prev };
                    if (selectedMarker === 'transparent') delete next[wordId];
                    else next[wordId] = selectedMarker;
                    return next;
                });
            };

            const renderTextWithMarker = (text, pIndex) => {
                const originalIndex = CONTENT.paragraphs.findIndex(orig => orig.id === parasToRender[pIndex].id);
                const formatted = formatText(text, nikkudLevel);
                const words = formatted.split(/\s+/);
                return words.map((w, i) => {
                    const wordId = `${originalIndex}-${i}`;
                    const isActive = activeWordId === wordId;
                    const bgColor = isActive ? (selectedMarker === 'transparent' ? '#FEF08A' : selectedMarker) : (highlights[wordId] || 'transparent');
                    
                    return (
                        <span key={i} id={`word-${wordId}`} 
                            onClick={() => handleWordClickFluency(wordId)} 
                            onMouseEnter={() => { if(timerOn) setActiveWordId(wordId) }}
                            onMouseLeave={() => { if(timerOn && activeWordId === wordId) setActiveWordId(null) }}
                            className={`inline-block mx-1 cursor-pointer rounded px-1 pb-1.5 ${isActive ? 'shadow-md border-b-[3px] border-primary' : 'hover:bg-amber-100 border-b-[3px] border-transparent'}`}
                            style={{ backgroundColor: bgColor }}
                        >{w}</span>
                    );
                });
            };

            return (
                <div className="flex flex-col fade-in pb-10">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <h2 className="text-3xl font-bold text-primary">{formatText("שֶׁטֶף קְרִיאָה", nikkudLevel)}</h2>
                        {!timerOn && !done && (
                            <div className="flex bg-white rounded-lg shadow border border-amber-200 p-1 flex-wrap justify-center">
                                <button onClick={toggleAll} className={`px-4 py-1 rounded font-bold transition ${isAll ? 'bg-primary text-white' : 'text-amber-800 hover:bg-amber-100'}`}>{formatText("הַכּוֹל", nikkudLevel)}</button>
                                {CONTENT.paragraphs.map((p, i) => (
                                    <button key={i} onClick={() => togglePara(i.toString())} className={`px-4 py-1 rounded font-bold transition ${!isAll && selectedParas.includes(i.toString()) ? 'bg-primary text-white' : 'text-amber-800 hover:bg-amber-100'}`}>{formatText(`פִּסְקָה ${p.id}`, nikkudLevel)}</button>
                                ))}
                            </div>
                        )}
                        <div className="flex items-center gap-4 bg-white px-6 py-2 rounded-full shadow border border-amber-200">
                            <i className="fa-solid fa-stopwatch text-2xl text-amber-600"></i>
                            <span className="text-2xl font-bold font-mono text-amber-800">{Math.floor(time / 60).toString().padStart(2, '0')}:{(time % 60).toString().padStart(2, '0')}</span>
                        </div>
                    </div>
                    {!done && (
                        <div className="bg-amber-50 text-amber-800 text-sm p-2 text-center rounded-lg mb-4 shadow-sm border border-amber-200">
                            <i className="fa-solid fa-lightbulb text-primary mr-1"></i> {formatText("טִיפ: הִשְׁתַּמְּשׁוּ בָּעַכְבָּר לְסִימּוּן מִילִּים, אוֹ בַּחִצִּים לְהֶמְשֵׁךְ קְרִיאָה.", nikkudLevel)}
                        </div>
                    )}
                    <div className="mb-6 flex flex-wrap justify-center items-center gap-4 relative z-10">
                        <MarkerPalette selectedMarker={selectedMarker} setSelectedMarker={setSelectedMarker} onClearAll={() => setHighlights({})} />
                        {!timerOn && !done && (
                            <button onClick={() => setTimerOn(true)} className="px-10 py-4 bg-success text-white text-2xl font-bold rounded-xl shadow hover:bg-green-600 transition">
                                <i className="fa-solid fa-play mr-2"></i> {formatText("הַתְחִילוּ לִקְרוֹא", nikkudLevel)}
                            </button>
                        )}
                    </div>
                    <div className={`bg-white p-6 md:p-8 rounded-2xl shadow-md border border-amber-200 text-3xl md:text-4xl leading-loose text-justify text-amber-950 relative select-none ${done ? 'opacity-50' : ''}`}>
                        {parasToRender.map((p, i) => (
                            <div key={i} className="mb-8">
                                <span className="text-primary font-bold ml-2">{formatText(`פִּסְקָה ${p.id}:`, nikkudLevel)}</span>
                                {renderTextWithMarker(p.text, i)}
                            </div>
                        ))}
                    </div>
                    {timerOn && (
                        <div className="mt-8 flex justify-center relative z-10 fade-in">
                            <button onClick={handleFinish} className="px-12 py-5 bg-error text-white text-3xl font-bold rounded-xl shadow-lg hover:bg-red-600 transition animate-pulse">
                                <i className="fa-solid fa-flag-checkered mr-2"></i> {formatText("סִיַּימְתִּי לִקְרוֹא", nikkudLevel)}
                            </button>
                        </div>
                    )}
                    {done && attempts.length > 0 && (
                        <div className="fixed inset-0 z-50 bg-black bg-opacity-60 flex items-center justify-center p-4 fade-in">
                            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-2xl border-4 border-primary overflow-y-auto max-h-[90vh]">
                                <h3 className="text-2xl font-bold text-center text-primary mb-6"><i className="fa-solid fa-chart-simple mr-2"></i> {formatText("גְּרַף הִתְקַדְּמוּת", nikkudLevel)}</h3>
                                <div className="flex items-end justify-center gap-6 h-40 border-b-2 border-amber-200 pb-2">
                                    {attempts.map((att, idx) => {
                                        const maxWcpm = Math.max(...attempts.map(a => a.wcpm), 10);
                                        const height = `${(att.wcpm / maxWcpm) * 100}%`;
                                        return (
                                            <div key={idx} className="flex flex-col items-center gap-2 h-full justify-end">
                                                <span className="text-amber-800 font-bold text-lg">{att.wcpm}</span>
                                                <div className="w-16 bg-primary rounded-t-lg transition-all duration-1000 shadow" style={{height}}></div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="mt-8 text-center">
                                    <button onClick={handleReset} className="px-8 py-3 bg-primary text-white text-xl font-bold rounded-xl shadow hover:bg-amber-600 transition">{formatText("נִיסָּיוֹן חוֹזֵר", nikkudLevel)}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ScreenSingleParagraphStudy = ({ paraIdx, nikkudLevel }) => {
            const [stage, setStage] = useState('pyramid'); 
            const [pyramidStep, setPyramidStep] = useState(0);
            const [currentQ, setCurrentQ] = useState(0);
            const [selectedIdx, setSelectedIdx] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");
            
            const [selectedMarker, setSelectedMarker] = useState('#FEF08A');
            const [highlights, setHighlights] = useState({});
            const [shuffledOptions, setShuffledOptions] = useState([]);
            const [correctOptText, setCorrectOptText] = useState("");
            
            const pData = CONTENT.paragraphs[paraIdx];

            useEffect(() => { setStage('pyramid'); setPyramidStep(0); setCurrentQ(0); setSelectedIdx(null); setErrorMsg(""); setHighlights({}); }, [paraIdx]);
            
            useEffect(() => { 
                setHighlights({}); 
                if (stage === 'questions' && pData.questions[currentQ]) {
                    const q = pData.questions[currentQ];
                    setCorrectOptText(q.options[q.a]);
                    setShuffledOptions(shuffleArray(q.options));
                    setSelectedIdx(null);
                    setErrorMsg("");
                }
            }, [currentQ, stage, pData]); 

            const handleNextStage = () => {
                setStage('questions');
            };

            const handleAnswer = (optText, idx) => {
                setSelectedIdx(idx);
                if (optText === correctOptText) {
                    playSuccess(); setErrorMsg("");
                    setTimeout(() => {
                        setSelectedIdx(null);
                        if (currentQ < pData.questions.length - 1) { setCurrentQ(q => q + 1); } 
                        else { triggerConfetti(); setStage('done'); }
                    }, 1000);
                } else {
                    playError(); setErrorMsg(formatText("נַסּוּ שׁוּב!", nikkudLevel)); setTimeout(() => setSelectedIdx(null), 1000);
                }
            };

            const handleWordClick = (wIdx) => {
                setHighlights(prev => {
                    const next = { ...prev };
                    if (selectedMarker === 'transparent') delete next[wIdx];
                    else next[wIdx] = selectedMarker;
                    return next;
                });

                                    <div key={cat} className="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-amber-50 p-4 rounded-xl border border-amber-200">
                                        <span className="text-xl font-bold text-amber-900">{formatText(['עִנְיָין', 'קוֹשִׁי', 'דְּבָרִים חֲדָשִׁים'][i], nikkudLevel)}</span>
                                        <div className="flex gap-6 justify-center" dir="ltr">
                                            <button onClick={() => setRatings(prev => ({ ...prev, [cat]: 'sad' }))} className={`text-4xl ${ratings[cat] === 'sad' ? 'text-error' : 'text-gray-400 opacity-50'}`}><i className="fa-solid fa-face-frown"></i></button>
                                            <button onClick={() => setRatings(prev => ({ ...prev, [cat]: 'meh' }))} className={`text-4xl ${ratings[cat] === 'meh' ? 'text-yellow-500' : 'text-gray-400 opacity-50'}`}><i className="fa-solid fa-face-meh"></i></button>
                                            <button onClick={() => setRatings(prev => ({ ...prev, [cat]: 'happy' }))} className={`text-4xl ${ratings[cat] === 'happy' ? 'text-success' : 'text-gray-400 opacity-50'}`}><i className="fa-solid fa-face-smile"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-8 flex flex-col md:flex-row justify-center gap-4">
                                <button onClick={() => { setSubmitted(true); triggerConfetti(); playSuccess(); }} disabled={!ratings.interest || !ratings.difficulty || !ratings.newThings} className="px-10 py-4 bg-primary text-white text-xl font-bold rounded-xl shadow-lg disabled:opacity-50">{formatText("שְׁלִיחַת מָשׁוֹב וְסִיּוּם", nikkudLevel)}</button>
                                <button onClick={onExport} className="px-6 py-4 bg-sky-600 text-white text-xl font-bold rounded-xl shadow-lg flex items-center justify-center gap-2"><i className="fa-solid fa-envelope"></i> {formatText("צְפִיָּה וּשְׁלִיחַת תּוֹצָאוֹת", nikkudLevel)}</button>
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col items-center gap-6 w-full">
                            <div className="bg-green-100 p-8 rounded-2xl shadow-lg border-2 border-success text-center mt-8 fade-in w-full"><h3 className="text-3xl font-bold text-success mb-4">{formatText("תּוֹדָה רַבָּה!", nikkudLevel)}</h3></div>
                            <button onClick={onExport} className="px-8 py-4 bg-sky-600 text-white text-xl font-bold rounded-xl shadow-lg flex items-center gap-3 fade-in"><i className="fa-solid fa-envelope"></i> {formatText("לַחֲצוּ כָּאן לִצְפִיָּה בַּתּוֹצָאוֹת", nikkudLevel)}</button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [currentScreen, setCurrentScreen] = useState(0);
            const [nikkudLevel, setNikkudLevel] = useState('full');
            const [isMuted, setIsMuted] = useState(true);
            const [isShowResults, setIsShowResults] = useState(false); 
            
            const [fluencyAttempts, setFluencyAttempts] = useState([]);
            const [openAnswers, setOpenAnswers] = useState(Array(CONTENT.openQuestions.length).fill(""));
            
            const [teacherEmail, setTeacherEmail] = useState("");
            const [copySuccess, setCopySuccess] = useState(false);

            const audioCtxRef = useRef(null); const noiseNodeRef = useRef(null);

            const initNoise = () => {
                try {
                    if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    if (!noiseNodeRef.current) {
                        const bufferSize = audioCtxRef.current.sampleRate * 2; const buffer = audioCtxRef.current.createBuffer(1, bufferSize, audioCtxRef.current.sampleRate);
                        const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; 
                        const noise = audioCtxRef.current.createBufferSource(); noise.buffer = buffer; noise.loop = true;
                        const gainNode = audioCtxRef.current.createGain(); gainNode.gain.value = 0.03; 
                        noise.connect(gainNode); gainNode.connect(audioCtxRef.current.destination); noise.start(); noiseNodeRef.current = { source: noise, gain: gainNode };
                    }
                } catch(e) {}
            };

            useEffect(() => {
                if (audioCtxRef.current) { if (isMuted) { if (audioCtxRef.current.state === 'running') audioCtxRef.current.suspend(); } else { if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume(); } }
            }, [isMuted, currentScreen]);

            const generateResultsText = () => {
                let text = `סיכום תוצאות אישי - ${formatText(CONTENT.title, 'none')}\n\n`;
                text += `--- שטף קריאה (WCPM) ---\n`;
                if (fluencyAttempts.length > 0) fluencyAttempts.forEach((a, i) => text += `ניסיון ${i + 1}: ${a.wcpm} מילים בדקה\n`);
                else text += `לא בוצע תרגול שטף קריאה.\n`;
                text += `\n--- שאלות פתוחות ---\n`;
                CONTENT.openQuestions.forEach((q, i) => { text += `שאלה ${i + 1}: ${formatText(q, 'none')}\nתשובה: ${openAnswers[i] ? openAnswers[i] : 'לא ניתנה תשובה.'}\n\n`; });
                return text;
            };

            const handleCopyText = () => {
                const fullText = `תוצאות לומדה: ${formatText(CONTENT.title, 'none')}\n\n` + generateResultsText();
                const textArea = document.createElement("textarea"); textArea.value = fullText; document.body.appendChild(textArea); textArea.select();
                try { document.execCommand('copy'); setCopySuccess(true); setTimeout(() => setCopySuccess(false), 3000); } catch (err) {} document.body.removeChild(textArea);
            };

            const screens = [
                <ScreenHome key="home" onNext={() => { if (!isMuted) { initNoise(); if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume(); } setCurrentScreen(1); }} nikkudLevel={nikkudLevel} />,
                <ScreenIntroVideo key="video" onNext={() => setCurrentScreen(2)} nikkudLevel={nikkudLevel} />,
                <ScreenVideoQuestion key="vq" onNext={() => setCurrentScreen(3)} nikkudLevel={nikkudLevel} />,
                <ScreenVocab key="vocab" nikkudLevel={nikkudLevel} />,
                <ScreenFlashWords key="flash" nikkudLevel={nikkudLevel} />,
                <ScreenAuditory key="aud" nikkudLevel={nikkudLevel} />,
                <ScreenFluency key="fluency" nikkudLevel={nikkudLevel} attempts={fluencyAttempts} setAttempts={setFluencyAttempts} />,
                ...CONTENT.paragraphs.map((p, i) => <ScreenSingleParagraphStudy key={'para'+i} paraIdx={i} nikkudLevel={nikkudLevel} />),
                <ScreenOpenQuestions key="open" nikkudLevel={nikkudLevel} answers={openAnswers} setAnswers={setOpenAnswers} />,
                <ScreenLinguistic key="ling" nikkudLevel={nikkudLevel} />,
                <ScreenAnalogies key="analogy" nikkudLevel={nikkudLevel} />,
                <ScreenComparison key="comp" nikkudLevel={nikkudLevel} />,
                <ScreenOrganizer key="org" nikkudLevel={nikkudLevel} />,
                <ScreenGame key="game" nikkudLevel={nikkudLevel} />,
                <ScreenSurvey key="survey" onExport={() => setIsShowResults(true)} nikkudLevel={nikkudLevel} />
            ];

            const screenTitles = ["בַּיִת", "סִירְטוֹן", "שְׁאֵלַת סִירְטוֹן", "אוֹצַר מִילִּים", "חֲשִׂיפָה מְהִירָה", "שְׁמִיעָתִי", "שֶׁטֶף קְרִיאָה", ...CONTENT.paragraphs.map(p => `פִּסְקָה ${p.id}`), "שְׁאֵלוֹת פְּתוּחוֹת", "עֲבוֹדָה לְשׁוֹנִית", "אָנָלוֹגְיוֹת", "טַבְלַת הַשְׁוָואָה", "מְאַרְגֵּן גְּרָפִי", "מִשְׂחַק מְסַכֵּם", "סֶקֶר"];

            if (isShowResults) {
                return (
                    <div className="p-4 md:p-8 bg-white text-black min-h-screen bg-dots" dir="rtl">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 bg-amber-50 p-4 rounded-xl border-2 border-amber-200 shadow-sm gap-4">
                            <div><h2 className="text-2xl font-bold text-amber-900 mb-1">סיכום תוצאות אישי</h2></div>
                            <button onClick={() => setIsShowResults(false)} className="px-6 py-3 bg-gray-200 text-gray-800 font-bold rounded-xl shadow hover:bg-gray-300 flex items-center gap-2"><i className="fa-solid fa-arrow-right"></i> חזור ללומדה</button>
                        </div>
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-white p-6 rounded-2xl shadow-lg border-4 border-sky-300 mb-8 flex flex-col gap-4">
                                <h3 className="text-xl font-bold text-sky-900">שליחת התוצאות</h3>
                                <input type="email" placeholder="כתובת המייל של המורה" className="p-3 border-2 border-sky-200 rounded-lg outline-none w-full text-left bg-sky-50" dir="ltr" value={teacherEmail} onChange={(e) => setTeacherEmail(e.target.value)} />
                                <div className="flex flex-col sm:flex-row gap-3 mt-2">
                                    <a href={`https://mail.google.com/mail/?view=cm&fs=1&to=${teacherEmail}&su=${encodeURIComponent('תוצאות לומדה: ' + formatText(CONTENT.title, 'none'))}&body=${encodeURIComponent(generateResultsText())}`} target="_blank" rel="noopener noreferrer" className="flex-1 px-4 py-4 bg-red-500 text-white font-bold rounded-xl text-center"><i className="fa-brands fa-google"></i> פתח ב-Gmail</a>
                                    <a href={`mailto:${teacherEmail}?subject=${encodeURIComponent('תוצאות לומדה: ' + formatText(CONTENT.title, 'none'))}&body=${encodeURIComponent(generateResultsText())}`} target="_blank" rel="noopener noreferrer" className="flex-1 px-4 py-4 bg-sky-600 text-white font-bold rounded-xl text-center"><i className="fa-solid fa-envelope"></i> אפליקציית מייל</a>
                                    <button onClick={handleCopyText} className="flex-1 px-4 py-4 bg-amber-500 text-white font-bold rounded-xl"><i className={`fa-solid ${copySuccess ? 'fa-check' : 'fa-copy'}`}></i> {copySuccess ? 'הועתק!' : 'העתק טקסט'}</button>
                                </div>
                            </div>
                            <h1 className="text-4xl font-bold text-amber-600 border-b-4 border-amber-300 pb-4 mb-8 text-center">סיכום אישי</h1>
                            <div className="mb-8 p-6 bg-amber-50 rounded-2xl border-2 border-amber-200">
                                <h2 className="text-2xl font-bold text-amber-800 mb-4">שטף קריאה (WCPM)</h2>
                                {fluencyAttempts.length > 0 ? fluencyAttempts.map((a, i) => <p key={i} className="text-xl mb-3">ניסיון {i+1}: <span className="text-success font-bold">{a.wcpm} מילים בדקה</span></p>) : <p>לא בוצע תרגול.</p>}
                            </div>
                            <div className="mb-8 p-6 bg-amber-50 rounded-2xl border-2 border-amber-200">
                                <h2 className="text-2xl font-bold text-amber-800 mb-6">שאלות פתוחות</h2>
                                {CONTENT.openQuestions.map((q, i) => (
                                    <div key={i} className="mb-6"><div className="font-bold text-xl mb-3 text-amber-900">{i+1}. {formatText(q, 'none')}</div><div className="p-4 bg-white border-2 border-dashed border-amber-400 rounded-xl min-h-[4rem] text-lg">{openAnswers[i] || 'לא ניתנה תשובה.'}</div></div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col min-h-screen bg-dots relative print:hidden">
                    <div className="sticky top-0 z-50 w-full shadow-sm">
                        <header className="bg-white border-b-4 border-primary p-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setCurrentScreen(0)} className="w-12 h-12 rounded-full flex items-center justify-center text-xl bg-amber-100 text-amber-800 hover:bg-amber-200"><i className="fa-solid fa-house"></i></button>
                                <i className="fa-solid fa-feather-pointed text-3xl text-primary hidden md:block"></i>
                                <h1 className="text-xl font-bold text-amber-900 hidden md:block">{formatText(CONTENT.title, 'none')}</h1>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="bg-amber-50 rounded-lg p-1 border border-amber-200 flex text-sm font-bold">
                                    <button onClick={() => setNikkudLevel('full')} className={`px-3 py-1.5 rounded ${nikkudLevel === 'full' ? 'bg-primary text-white' : 'text-amber-800'}`}>מלא</button>
                                    <button onClick={() => setNikkudLevel('partial')} className={`px-3 py-1.5 rounded ${nikkudLevel === 'partial' ? 'bg-primary text-white' : 'text-amber-800'}`}>חלקי</button>
                                    <button onClick={() => setNikkudLevel('none')} className={`px-3 py-1.5 rounded ${nikkudLevel === 'none' ? 'bg-primary text-white' : 'text-amber-800'}`}>ללא</button>
                                </div>
                                <button onClick={() => { const nm = !isMuted; setIsMuted(nm); if (!nm) { initNoise(); if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume(); } else { if (audioCtxRef.current && audioCtxRef.current.state === 'running') audioCtxRef.current.suspend(); } }} className={`w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-md ${isMuted ? 'bg-gray-200' : 'bg-primary text-white hover:bg-amber-800'}`}><i className={`fa-solid ${isMuted ? 'fa-volume-xmark' : 'fa-wave-square'}`}></i></button>
                            </div>
                        </header>
                        <nav className="bg-amber-50 border-b-2 border-amber-300 overflow-x-auto whitespace-nowrap px-4 py-3 flex gap-3 hide-scrollbar shadow-inner w-full" dir="rtl">
                            {screenTitles.map((title, i) => (
                                <button key={i} onClick={() => { setCurrentScreen(i); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className={`px-5 py-2 rounded-full text-sm md:text-base font-bold transition-all ${currentScreen === i ? 'bg-primary text-white scale-105 border-2 border-primary' : 'bg-white text-amber-800 border-2 border-amber-300 hover:bg-amber-100'}`}>{formatText(title, nikkudLevel)}</button>
                            ))}
                        </nav>
                        <div className="w-full bg-amber-200 h-3 border-b border-amber-300"><div className="bg-primary h-full transition-all duration-500 ease-out" style={{ width: `${(currentScreen / (screens.length - 1)) * 100}%` }}></div></div>
                    </div>
                    <main className="flex-1 relative max-w-6xl mx-auto w-full p-4 md:p-6 pb-20">{screens[currentScreen]}</main>
                    {currentScreen > 0 && (
                        <footer className="bg-white border-t flex flex-col z-40 sticky bottom-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] mt-auto w-full">
                            <div className="p-4 flex justify-between items-center w-full">
                                <button onClick={() => { setCurrentScreen(Math.max(0, currentScreen - 1)); window.scrollTo({ top: 0, behavior: 'smooth' }); }} disabled={currentScreen === 0} className="px-6 py-2 bg-amber-100 text-amber-800 font-bold rounded-lg disabled:opacity-50 hover:bg-amber-200"><i className="fa-solid fa-arrow-right mr-2"></i> {formatText("הַקּוֹדֵם", nikkudLevel)}</button>
                                <button onClick={() => { setCurrentScreen(Math.min(screens.length - 1, currentScreen + 1)); window.scrollTo({ top: 0, behavior: 'smooth' }); }} disabled={currentScreen === screens.length - 1} className="px-6 py-2 bg-primary text-white rounded-lg disabled:opacity-50 font-bold hover:bg-amber-800">{formatText("הַבָּא", nikkudLevel)} <i className="fa-solid fa-arrow-left ml-2"></i></button>
                            </div>
                            <div className="bg-amber-100 text-center py-3 text-xs md:text-sm font-bold text-amber-900 border-t border-amber-200 w-full shadow-inner"><i className="fa-solid fa-feather text-primary text-[10px] mr-1"></i> נוצר ע״י מורן קמיל גלברג, הוראה מותאמת, באמצעות בינה מלאכותית <i className="fa-solid fa-feather text-primary text-[10px] ml-1"></i></div>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
